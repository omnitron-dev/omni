# Test infrastructure with non-default ports to avoid collisions with local services.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pnpm test
#   docker compose -f docker-compose.test.yml down -v
#
# Override ports via environment:
#   TEST_REDIS_PORT=26379 TEST_POSTGRES_PORT=25432 docker compose -f docker-compose.test.yml up -d

services:
  redis-test:
    image: redis:7-alpine
    ports:
      - "${TEST_REDIS_PORT:-16379}:6379"
    command: redis-server --save "" --appendonly no --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data

  postgres-test:
    image: postgres:16-alpine
    ports:
      - "${TEST_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    command: >
      postgres
        -c shared_buffers=128MB
        -c max_connections=50
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
